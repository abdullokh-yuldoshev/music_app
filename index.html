<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css?v=2.1">
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-top">
                <h1 class="app-title" id="pageTitle">Главная</h1>
                <span class="app-version">v2.0</span>
            </div>
            <div class="search-container" id="searchContainer">
                <input type="text" id="searchInput" class="search-input" placeholder="Поиск треков и артистов...">
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Home Tab -->
            <div class="tab-content active" id="homeTab">
                <!-- Category Tabs -->
                <div class="category-tabs" id="categoryTabs">
                    <button class="category-tab active" data-category="all">Все</button>
                    <button class="category-tab" data-category="pop">Поп</button>
                    <button class="category-tab" data-category="rock">Рок</button>
                    <button class="category-tab" data-category="electronic">Электроника</button>
                    <button class="category-tab" data-category="hiphop">Хип-хоп</button>
                    <button class="category-tab" data-category="jazz">Джаз</button>
                    <button class="category-tab" data-category="classical">Классика</button>
                </div>

                <!-- Track List -->
                <div class="track-list" id="trackList">
                    <div class="loading">Загрузка треков...</div>
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination">
                    <button class="pagination-btn" id="prevPageBtn">← Назад</button>
                    <span class="page-info" id="pageInfo">Страница 1</span>
                    <button class="pagination-btn" id="nextPageBtn">Вперед →</button>
                </div>
            </div>

            <!-- My Music Tab -->
            <div class="tab-content" id="myMusicTab">
                <div class="empty-state">
                    <div class="empty-icon">🎵</div>
                    <h2>Моя музыка</h2>
                    <p>Здесь будут ваши любимые треки</p>
                </div>
            </div>

            <!-- Search Tab -->
            <div class="tab-content" id="searchTab">
                <div class="search-page">
                    <div class="search-input-large">
                        <input type="text" id="searchInputLarge" class="search-input" placeholder="Поиск треков, артистов, альбомов...">
                    </div>
                    <div class="search-results" id="searchResults">
                        <div class="search-suggestions">
                            <h3>Популярные запросы</h3>
                            <div class="suggestion-item">Taylor Swift</div>
                            <div class="suggestion-item">Drake</div>
                            <div class="suggestion-item">Ed Sheeran</div>
                            <div class="suggestion-item">Баста</div>
                            <div class="suggestion-item">Скриптонит</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Profile Tab -->
            <div class="tab-content" id="profileTab">
                <div class="empty-state">
                    <div class="empty-icon">👤</div>
                    <h2>Профиль</h2>
                    <p>Войдите для доступа к библиотеке</p>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-tab="home">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Главная</span>
            </button>
            <button class="nav-item" data-tab="myMusic">
                <span class="nav-icon">🎵</span>
                <span class="nav-label">Моя музыка</span>
            </button>
            <button class="nav-item" data-tab="search">
                <span class="nav-icon">🔍</span>
                <span class="nav-label">Поиск</span>
            </button>
            <button class="nav-item" data-tab="profile">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Профиль</span>
            </button>
        </nav>

        <!-- Player Panel -->
        <div class="player-panel" id="playerPanel">
            <div class="player-content">
                <div class="track-info">
                    <img src="" alt="Cover" class="player-cover" id="playerCover">
                    <div class="track-details">
                        <h3 class="player-title" id="playerTitle">Выберите трек</h3>
                        <p class="player-artist" id="playerArtist">--</p>
                    </div>
                </div>
                
                <!-- Progress Bar -->
                <div class="progress-container">
                    <span class="time" id="currentTime">0:00</span>
                    <input type="range" class="progress-bar" id="progressBar" value="0" min="0" max="100">
                    <span class="time" id="duration">0:00</span>
                </div>

                <!-- Controls -->
                <div class="controls">
                    <button class="control-btn" id="prevBtn">⏮</button>
                    <button class="control-btn play-btn" id="playBtn">▶</button>
                    <button class="control-btn" id="nextBtn">⏭</button>
                </div>
            </div>
        </div>

        <!-- Hidden YouTube Player -->
        <div id="youtube-player" style="display: none;"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
